<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Frontend Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e1117;
  --surface: #161b24;
  --surface2: #1e2535;
  --border: #252f42;
  --border2: #2e3d5a;
  --text: #e2e8f4;
  --text2: #8899bb;
  --text3: #4a5a7a;
  --green: #22c97a;
  --green-dim: #0f3d26;
  --amber: #f0a020;
  --amber-dim: #3a2800;
  --blue: #4d9ef5;
  --blue-dim: #0d2444;
  --red: #f05050;
  --red-dim: #3a1010;
  --accent: #4d9ef5;
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}

.header-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}

.header-title span {
  color: var(--blue);
}

.header-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.5px;
}

.progress-wrap {
  flex: 1;
  min-width: 200px;
  max-width: 360px;
}

.progress-bar-bg {
  background: var(--border);
  height: 5px;
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 4px;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--green));
  border-radius: 99px;
  transition: width 0.4s ease;
  width: 0%;
}

.progress-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  display: flex;
  justify-content: space-between;
}

.filter-row {
  display: flex;
  gap: 6px;
  margin-left: auto;
}

.filter-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}

.filter-btn:hover, .filter-btn.active {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--blue);
}

/* ── LAYOUT ── */
.layout {
  display: flex;
  min-height: calc(100vh - 80px);
}

/* ── SIDEBAR ── */
.sidebar {
  width: 200px;
  min-width: 200px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  position: sticky;
  top: 80px;
  height: calc(100vh - 80px);
  overflow-y: auto;
}

.sb-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  padding: 4px 16px 6px;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.12s;
  text-decoration: none;
}

.sb-item:hover { background: var(--surface2); }
.sb-item.active { border-left-color: var(--blue); background: var(--blue-dim); }

.sb-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
  transition: background 0.2s;
}
.sb-dot.done { background: var(--green); }
.sb-dot.partial { background: var(--amber); }

.sb-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sb-pct {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
}

/* ── MAIN ── */
.main {
  flex: 1;
  padding: 24px 28px;
  max-width: 860px;
}

/* ── PHASE BLOCK ── */
.phase {
  margin-bottom: 20px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface);
}

.phase-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 18px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}

.phase-header:hover { background: var(--surface2); }

.phase-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 3px;
  background: var(--blue-dim);
  color: var(--blue);
  border: 1px solid rgba(77,158,245,0.25);
  white-space: nowrap;
}

.phase-title {
  font-weight: 600;
  font-size: 13px;
  color: var(--text);
  flex: 1;
}

.phase-week {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text3);
}

.phase-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  min-width: 36px;
  text-align: right;
}

.phase-chevron {
  color: var(--text3);
  font-size: 10px;
  transition: transform 0.15s;
}
.phase-chevron.open { transform: rotate(90deg); }

.phase-prog {
  height: 2px;
  background: var(--border);
}
.phase-prog-fill {
  height: 100%;
  background: var(--blue);
  transition: width 0.3s;
  opacity: 0.7;
}

.phase-body { display: none; }
.phase-body.open { display: block; }

/* ── GROUP ── */
.group {
  border-top: 1px solid var(--border);
}

.group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px 8px 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text3);
  background: rgba(255,255,255,0.02);
  cursor: pointer;
  user-select: none;
}

.group-header:hover { color: var(--text2); }
.group-count { margin-left: auto; font-weight: 400; }

.group-body { display: none; }
.group-body.open { display: block; }

/* ── TASK ROW ── */
.task {
  border-top: 1px solid var(--border);
  transition: background 0.1s;
}

.task:hover { background: rgba(255,255,255,0.02); }
.task.done { opacity: 0.45; }
.task.done .task-label { text-decoration: line-through; color: var(--text3); }

.task-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 18px 10px 24px;
  cursor: pointer;
}

.checkbox {
  width: 16px;
  height: 16px;
  border-radius: 3px;
  border: 1.5px solid var(--border2);
  background: transparent;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
}

.checkbox:hover { border-color: var(--blue); }
.task.done .checkbox { background: var(--green); border-color: var(--green); }
.task.done .checkbox::after { content: '✓'; font-size: 9px; color: #000; font-weight: 700; }

.task-content { flex: 1; }

.task-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.5;
}

.task-meta {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 4px;
}

.tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
}

.tag-critical { background: var(--red-dim); color: var(--red); }
.tag-vue      { background: #0d2e1a; color: #4dc98a; }
.tag-js       { background: #2a2200; color: #d4a800; }
.tag-css      { background: #1a0d2e; color: #9a7ae8; }
.tag-blade    { background: #2a1200; color: #d47820; }
.tag-api      { background: var(--blue-dim); color: var(--blue); }
.tag-test     { background: var(--amber-dim); color: var(--amber); }

/* ── DETAIL PANEL ── */
.task-detail {
  display: none;
  padding: 4px 18px 14px 50px;
  background: rgba(255,255,255,0.015);
  border-top: 1px solid var(--border);
}

.task-detail.open { display: block; }

.detail-section { margin-top: 10px; }

.detail-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin-bottom: 4px;
}

.dl-what  { color: #4dc98a; }
.dl-why   { color: var(--blue); }
.dl-how   { color: #c084fc; }
.dl-files { color: var(--amber); }
.dl-check { color: var(--green); }

.detail-text {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.75;
}

.steps-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-top: 4px;
}

.step-item {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
}

.step-item::before {
  content: '→';
  color: var(--text3);
  flex-shrink: 0;
  margin-top: 1px;
}

.check-item {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  font-size: 12px;
  color: var(--text2);
}

.check-item::before {
  content: '✓';
  color: var(--green);
  font-weight: 700;
  flex-shrink: 0;
}

.file-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  padding: 2px 0;
}

.file-icon {
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}

.fi-vue   { background: #0d2e1a; color: #4dc98a; }
.fi-js    { background: #2a2200; color: #d4a800; }
.fi-blade { background: #2a1200; color: #d47820; }
.fi-css   { background: #1a0d2e; color: #9a7ae8; }

.warn-box {
  background: var(--amber-dim);
  border: 1px solid rgba(240,160,32,0.3);
  border-radius: 5px;
  padding: 8px 11px;
  margin-top: 8px;
}
.warn-box-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}
.warn-box-text { font-size: 12px; color: var(--text2); }

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

@media (max-width: 680px) {
  .sidebar { display: none; }
  .main { padding: 14px; }
  .header { padding: 14px 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">ERP <span>Frontend</span> Roadmap</div>
    <div class="header-meta">Vue 3 · Pinia · Axios · VeeValidate · SmartAdmin 4.5.1 · Vite</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-bar"></div>
    </div>
    <div class="progress-label">
      <span id="prog-text">0 / 0 tasks</span>
      <span id="prog-pct">0%</span>
    </div>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('todo', this)">To Do</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main" id="main"></div>
</div>

<script>
var STATE_KEY = 'erp_fe_roadmap_v1';
var state = {};
var currentFilter = 'all';

try { state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}'); } catch(e) {}

var PHASES = [
  {
    id: 'p0', tag: 'PHASE 0', title: 'Environment & Vite Setup', week: 'Week 1',
    groups: [
      {
        title: 'Tools & Config',
        tasks: [
          {
            id: 't01', label: 'Install Node.js 20 LTS via nvm',
            tags: ['critical', 'js'],
            what: 'Node.js runtime required to run Vite, compile Vue files, and install npm packages.',
            why: 'Without Node 18+, Vite will refuse to start and no Vue file can be compiled.',
            how: ['Install nvm from github.com/nvm-sh/nvm', 'Run: nvm install 20 && nvm use 20', 'Verify: node -v shows v20.x.x and npm -v shows 10.x.x'],
            files: ['.nvmrc'],
            checks: ['node -v shows v20.x.x', 'npm -v shows 10.x.x', 'npm run dev starts without error']
          },
          {
            id: 't02', label: 'Install VS Code extensions: Volar, ESLint, Prettier',
            tags: ['js'],
            what: 'Volar adds Vue 3 autocomplete and template error detection. ESLint catches JS errors. Prettier auto-formats on save.',
            why: 'Without Volar, writing Vue components is error-prone and slow. It catches prop mismatches and missing imports before you save.',
            how: ['Open VS Code Extensions panel (Ctrl+Shift+X)', 'Install: Vue - Official (Volar), ESLint, Prettier', 'Add .prettierrc: { "semi": false, "singleQuote": true, "tabWidth": 2 }', 'Set "editor.formatOnSave": true in VS Code settings'],
            files: ['.prettierrc', '.vscode/settings.json'],
            checks: ['Vue autocomplete works in .vue files', 'Saving a JS file auto-formats the code']
          },
          {
            id: 't03', label: 'Install all npm packages: Vue 3, Pinia, Axios, VeeValidate, Chart.js',
            tags: ['critical', 'js'],
            what: 'The 6 core frontend libraries: Vue 3 (UI), Pinia (state), Axios (HTTP), VeeValidate 4 (forms), Chart.js + vue-chartjs (charts), @vueuse/core (utilities).',
            why: 'Every page in the system uses at least 3 of these. Installing them once now means they are ready for all 30+ pages.',
            how: ['npm install vue@latest @vitejs/plugin-vue pinia axios', 'npm install vee-validate@4 @vee-validate/rules yup', 'npm install chart.js vue-chartjs @vueuse/core', 'Verify package.json shows vue ^3.4.x, pinia ^2.x, vee-validate ^4.x'],
            files: ['package.json'],
            checks: ['npm install runs with zero errors', 'node_modules/vue exists', 'npm run dev compiles without errors']
          },
          {
            id: 't04', label: 'Configure vite.config.js with Vue plugin, page auto-discovery, and path aliases',
            tags: ['critical', 'js'],
            what: 'Vite config enables .vue file compilation, auto-discovers all page entry points in resources/js/pages/, and sets up @comps / @api / @stores aliases.',
            why: 'Without the Vue plugin, .vue files throw errors. Without aliases, import paths become unmaintainable across 30+ pages.',
            how: ['Add @vitejs/plugin-vue to plugins array', 'Use readdirSync to auto-discover pages/*/index.js entry points', 'Set aliases: @ = resources/js, @comps = components, @api = api, @stores = stores', 'Add server proxy: /api -> localhost:8000'],
            files: ['vite.config.js'],
            checks: ['npm run dev shows VITE ready', 'Adding new page folder is auto-detected', 'import from "@comps/DataTable.vue" resolves correctly'],
            warn: 'Never hardcode localhost:8000 inside Vue components. The proxy handles it in dev; Nginx handles it in production.'
          },
          {
            id: 't05', label: 'Create shared Axios instance with Bearer token and 401 auto-redirect',
            tags: ['critical', 'api'],
            what: 'One shared Axios instance in resources/js/api/axios.js with base URL, Sanctum withCredentials, request interceptor for Bearer token, and response interceptor for 401 redirect.',
            why: 'Every API call uses this. Centralising it means fixing auth in one file fixes all 22+ API service files at once.',
            how: ['Create resources/js/api/axios.js', 'Set baseURL from import.meta.env.VITE_API_URL', 'Add request interceptor: inject localStorage token as Authorization header', 'Add response interceptor: on 401, clear token and redirect to /login', 'Add VITE_API_URL=http://localhost:8000/api/v1 to .env'],
            files: ['resources/js/api/axios.js', '.env'],
            checks: ['API call returns 200 with valid token', 'Without token, protected route redirects to /login', 'Network tab shows Authorization: Bearer xxx on every request'],
            warn: 'Never import axios directly in a component. Always use import api from "@api/axios" so interceptors run.'
          },
          {
            id: 't06', label: 'Create all resources/js/ folder structure',
            tags: ['js'],
            what: 'Pre-create all folders: api/, stores/, components/ui/, and a folder per page under pages/.',
            why: 'Vue and Pinia use static imports. Missing folders cause cryptic Vite build errors.',
            how: ['mkdir -p resources/js/api resources/js/stores resources/js/components/ui', 'Create pages/ subfolder for each of the 30+ pages (dashboard, users, branches, products, sales, pos, purchases, inventory-stock, inventory-lots, inventory-serials, etc.)', 'Create Modules/HRM/Resources/js/pages/ subfolders for HRM pages'],
            files: ['resources/js/ (full folder tree)'],
            checks: ['All page folders exist under resources/js/pages/', 'HRM pages folder exists under Modules/HRM/']
          }
        ]
      }
    ]
  },
  {
    id: 'p1', tag: 'PHASE 1', title: 'SmartAdmin Shell & Shared Components', week: 'Week 1–2',
    groups: [
      {
        title: 'SmartAdmin Layout',
        tasks: [
          {
            id: 't07', label: 'Copy SmartAdmin 4.5.1 dist/ to public/smartadmin/',
            tags: ['critical', 'css'],
            what: 'SmartAdmin provides the entire admin UI shell: sidebar, topbar, cards, tables, modals, badges, forms — all via Bootstrap 4.5 CSS classes.',
            why: 'Every page uses SmartAdmin CSS classes. Without the files the UI is completely unstyled raw HTML.',
            how: ['Locate smartadmin-html-full/dist/ inside the purchased ZIP', 'Copy entire dist/ folder to public/smartadmin/', 'Verify: public/smartadmin/css/app.min.css and public/smartadmin/js/app.bundle.js exist'],
            files: ['public/smartadmin/css/app.min.css', 'public/smartadmin/js/app.bundle.js'],
            checks: ['Visit localhost:8000 - SmartAdmin CSS loads in Network tab', 'No 404 errors for smartadmin files'],
            warn: 'SmartAdmin goes in public/ not resources/. It is served directly by the web server, not processed by Vite.'
          },
          {
            id: 't08', label: 'Create master Blade layout — layouts/app.blade.php with full sidebar nav',
            tags: ['critical', 'blade'],
            what: 'The HTML shell all Vue pages extend. Loads SmartAdmin CSS/JS, renders the sidebar with all 25+ navigation links, topbar with notification bell and user menu.',
            why: 'Every page inherits this layout. Build it once and all 30+ pages automatically get the correct shell.',
            how: ['Create resources/views/layouts/app.blade.php', 'Load SmartAdmin CSS/JS via asset() helper', 'Build sidebar nav with links for: Dashboard, Products, Customers, Suppliers, Inventory (Stock/Lots/Serials/Adjustments/Transfers/Counts), Sales, POS, Quotations, Purchases, COA, Journals, Expenses, Reports, HRM, Settings, Users, Branches, Warehouses, Tax', 'Add @yield("content") in main content area', 'Add @stack("scripts") before closing body tag'],
            files: ['resources/views/layouts/app.blade.php'],
            checks: ['Sidebar renders with all nav groups', 'Active page is highlighted in sidebar', 'No CSS 404 errors in browser console']
          },
          {
            id: 't09', label: 'Establish the 3-file Blade + Vue page pattern (template for all pages)',
            tags: ['critical', 'blade', 'vue'],
            what: 'Every page uses 3 files: (1) Blade shell extending layouts/app with @vite(), (2) index.js mounting Vue with Pinia, (3) PageComponent.vue with the actual UI.',
            why: 'This is the core architecture. Blade handles the shell; Vue handles all interactivity. Zero data passes through Blade — all data comes via API.',
            how: ['Create resources/views/dashboard/index.blade.php - extends layouts.app, has div#page-app', 'Create resources/js/pages/dashboard/index.js - createApp + createPinia + mount #page-app', 'Create resources/js/pages/dashboard/DashboardPage.vue - basic card placeholder', 'Create Web Controller returning view() only (no DB queries)', 'Add web route: GET /dashboard -> DashboardController@index'],
            files: ['resources/views/dashboard/index.blade.php', 'resources/js/pages/dashboard/index.js', 'resources/js/pages/dashboard/DashboardPage.vue'],
            checks: ['Visit /dashboard - SmartAdmin shell renders', 'Vue component text is visible inside the layout', 'No JavaScript errors in browser console (F12)'],
            warn: 'ZERO data passes from Blade to Vue. No @json() or PHP variables in Blade. All data comes from Axios API calls inside Vue.'
          }
        ]
      },
      {
        title: '12 Shared Components',
        tasks: [
          {
            id: 't10', label: 'Build DataTable.vue — sortable columns, pagination, search, loading overlay',
            tags: ['critical', 'vue'],
            what: 'Reusable table component with: named slots per column, sort by clicking headers, 350ms debounced search input, pagination controls, and loading spinner overlay.',
            why: 'Used on all 30+ list pages. One component means one fix updates everything. Without it you copy-paste table HTML 30 times.',
            how: ['Props: columns (array with key/label/sortable), rows, loading, total, currentPage, lastPage, perPage', 'Named slots for every column: <slot :name="col.key" :row="row">', 'Emit events: search (debounced 350ms), sort-change, page-change, per-page-change', 'Use SmartAdmin .table .table-hover .table-bordered classes', 'Show empty state with icon when rows is empty'],
            files: ['resources/js/components/ui/DataTable.vue'],
            checks: ['Table renders with rows and headers', 'Click sortable column - emits sort-change with key and direction', 'Search waits 350ms before emitting (check Network tab)', 'Loading spinner overlays when loading=true', 'Empty state shows when rows=[]']
          },
          {
            id: 't11', label: 'Build AppModal.vue — Bootstrap modal with Teleport, backdrop close, size prop',
            tags: ['vue'],
            what: 'Reusable modal using Teleport to body. Props: show, title, size (sm/md/lg/xl), icon. Slots: default body, named footer. Emits close.',
            why: 'Every create/edit form lives in a modal. Without this component you copy 40 lines of Bootstrap modal HTML per page.',
            how: ['Use Teleport to="body" to avoid clipping inside parent overflow:hidden', 'Props: show (Boolean), title, size, icon, closeOnBackdrop', 'Backdrop click triggers close emit', 'Add CSS transition for smooth fade in/out', 'Named footer slot for action buttons'],
            files: ['resources/js/components/ui/AppModal.vue'],
            checks: ['Modal appears with fade when show=true', 'Clicking backdrop closes modal', 'Footer slot renders buttons passed by parent', 'modal-lg applies correct width']
          },

// ── STATE ────────────────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
}

function isDone(id) { return state[id] === true; }

function toggle(id) {
  state[id] = !state[id];
  save();
  renderAll();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderAll();
}

// ── COUNT HELPERS ────────────────────────────────────────────────────────
function countPhase(phase) {
  var total = 0, done = 0;
  phase.groups.forEach(function(g) {
    g.tasks.forEach(function(t) {
      total++;
      if (isDone(t.id)) done++;
    });
  });
  return { total: total, done: done };
}

function countAll() {
  var total = 0, done = 0;
  PHASES.forEach(function(p) {
    var c = countPhase(p);
    total += c.total;
    done += c.done;
  });
  return { total: total, done: done };
}

// ── RENDER ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function tagHtml(tag) {
  var cls = { critical: 'tag-critical', vue: 'tag-vue', js: 'tag-js', css: 'tag-css', blade: 'tag-blade', api: 'tag-api', test: 'tag-test' }[tag] || '';
  return '<span class="tag ' + cls + '">' + esc(tag) + '</span>';
}

function taskVisible(task) {
  if (currentFilter === 'done') return isDone(task.id);
  if (currentFilter === 'todo') return !isDone(task.id);
  return true;
}

function renderTask(task) {
  var done = isDone(task.id);
  var detailOpen = state['_d_' + task.id] || false;
  var tags = (task.tags || []).map(tagHtml).join('');

  var howHtml = '';
  if (task.how && task.how.length) {
    howHtml = '<div class="detail-section"><div class="detail-label dl-how">How to do it</div><div class="steps-list">';
    task.how.forEach(function(step) {
      howHtml += '<div class="step-item">' + esc(step) + '</div>';
    });
    howHtml += '</div></div>';
  }

  var filesHtml = '';
  if (task.files && task.files.length) {
    filesHtml = '<div class="detail-section"><div class="detail-label dl-files">Files</div>';
    task.files.forEach(function(f) {
      var ext = f.split('.').pop().toLowerCase();
      var ic = { vue: 'fi-vue', js: 'fi-js', blade: 'fi-blade', css: 'fi-css' }[ext] || 'fi-js';
      filesHtml += '<div class="file-item"><span class="file-icon ' + ic + '">' + ext.toUpperCase() + '</span>' + esc(f) + '</div>';
    });
    filesHtml += '</div>';
  }

  var checksHtml = '';
  if (task.checks && task.checks.length) {
    checksHtml = '<div class="detail-section"><div class="detail-label dl-check">Checkpoints</div>';
    task.checks.forEach(function(c) {
      checksHtml += '<div class="check-item">' + esc(c) + '</div>';
    });
    checksHtml += '</div>';
  }

  var warnHtml = '';
  if (task.warn) {
    warnHtml = '<div class="warn-box"><div class="warn-box-label">⚠ WARNING</div><div class="warn-box-text">' + esc(task.warn) + '</div></div>';
  }

  return '<div class="task' + (done ? ' done' : '') + '" id="task-' + task.id + '">' +
    '<div class="task-row" onclick="toggleDetail(\'' + task.id + '\')">' +
      '<div class="checkbox" onclick="event.stopPropagation(); toggle(\'' + task.id + '\')"></div>' +
      '<div class="task-content">' +
        '<div class="task-label">' + esc(task.label) + '</div>' +
        '<div class="task-meta">' + tags + '</div>' +
      '</div>' +
      '<span style="font-size:10px;color:var(--text3);margin-left:8px">' + (detailOpen ? '▲' : '▼') + '</span>' +
    '</div>' +
    '<div class="task-detail' + (detailOpen ? ' open' : '') + '">' +
      '<div class="detail-section"><div class="detail-label dl-what">What</div><div class="detail-text">' + esc(task.what || '') + '</div></div>' +
      '<div class="detail-section"><div class="detail-label dl-why">Why</div><div class="detail-text">' + esc(task.why || '') + '</div></div>' +
      howHtml + filesHtml + checksHtml + warnHtml +
    '</div>' +
  '</div>';
}

function toggleDetail(id) {
  state['_d_' + id] = !state['_d_' + id];
  save();
  var el = document.querySelector('#task-' + id + ' .task-detail');
  var arrow = document.querySelector('#task-' + id + ' .task-row > span:last-child');
  if (el) el.classList.toggle('open');
  if (arrow) arrow.textContent = state['_d_' + id] ? '▲' : '▼';
}

function renderAll() {
  renderProgress();
  renderSidebar();
  renderMain();
}

function renderProgress() {
  var c = countAll();
  var pct = c.total > 0 ? Math.round(c.done / c.total * 100) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent = c.done + ' / ' + c.total + ' tasks';
  document.getElementById('prog-pct').textContent = pct + '%';
}

function renderSidebar() {
  var html = '<div class="sb-label">Phases</div>';
  PHASES.forEach(function(phase) {
    var c = countPhase(phase);
    var pct = c.total > 0 ? Math.round(c.done / c.total * 100) : 0;
    var dot = c.done === c.total && c.total > 0 ? 'done' : c.done > 0 ? 'partial' : '';
    html += '<a class="sb-item" href="#' + phase.id + '" onclick="scrollTo(\'' + phase.id + '\')">' +
      '<div class="sb-dot ' + dot + '"></div>' +
      '<span class="sb-name">' + esc(phase.tag) + '</span>' +
      '<span class="sb-pct">' + pct + '%</span>' +
    '</a>';
  });
  document.getElementById('sidebar').innerHTML = html;
}

function scrollTo(id) {
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderMain() {
  var html = '';
  PHASES.forEach(function(phase) {
    var c = countPhase(phase);
    var pct = c.total > 0 ? Math.round(c.done / c.total * 100) : 0;
    var phaseOpen = state['_p_' + phase.id] !== false;

    html += '<div class="phase" id="' + phase.id + '">';
    html += '<div class="phase-header" onclick="togglePhase(\'' + phase.id + '\')">';
    html += '<span class="phase-tag">' + esc(phase.tag) + '</span>';
    html += '<span class="phase-title">' + esc(phase.title) + '</span>';
    html += '<span class="phase-week">' + esc(phase.week) + '</span>';
    html += '<span class="phase-count">' + c.done + '/' + c.total + '</span>';
    html += '<span class="phase-chevron' + (phaseOpen ? ' open' : '') + '">&#9654;</span>';
    html += '</div>';
    html += '<div class="phase-prog"><div class="phase-prog-fill" style="width:' + pct + '%"></div></div>';
    html += '<div class="phase-body' + (phaseOpen ? ' open' : '') + '">';

    phase.groups.forEach(function(group) {
      var gid = phase.id + '_' + group.title.replace(/\s/g, '_');
      var gOpen = state['_g_' + gid] !== false;
      var gdone = group.tasks.filter(function(t) { return isDone(t.id); }).length;
      var visible = group.tasks.filter(taskVisible);

      if (visible.length === 0) return;

      html += '<div class="group">';
      html += '<div class="group-header" onclick="toggleGroup(\'' + gid + '\')">';
      html += '<span>' + (gOpen ? '▼' : '▶') + '</span>';
      html += esc(group.title);
      html += '<span class="group-count">' + gdone + '/' + group.tasks.length + '</span>';
      html += '</div>';
      html += '<div class="group-body' + (gOpen ? ' open' : '') + '">';
      visible.forEach(function(task) {
        html += renderTask(task);
      });
      html += '</div></div>';
    });

    html += '</div></div>';
  });
  document.getElementById('main').innerHTML = html;
}

function togglePhase(id) {
  state['_p_' + id] = state['_p_' + id] === false ? true : false;
  save();
  var body = document.querySelector('#' + id + ' .phase-body');
  var chevron = document.querySelector('#' + id + ' .phase-chevron');
  if (body) body.classList.toggle('open');
  if (chevron) chevron.classList.toggle('open');
}

function toggleGroup(gid) {
  state['_g_' + gid] = state['_g_' + gid] === false ? true : false;
  save();
  renderAll();
}

// ── INIT ─────────────────────────────────────────────────────────────────
PHASES.forEach(function(p) {
  if (state['_p_' + p.id] === undefined) state['_p_' + p.id] = true;
});
if (state['_p_' + PHASES[0].id] === undefined) state['_p_' + PHASES[0].id] = true;

renderAll();
</script>
